<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal de Vagas</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .vaga { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; }
    .vaga h2 { margin: 0; font-size: 18px; }
    .vaga p { margin: 5px 0; }
    .botao { background: #007BFF; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; }
    .botao:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h1>Portal de Vagas</h1>
  <div id="lista-vagas"></div>

  <script>
    async function carregarVagas() {
      try {
        const response = await fetch('vagas.json');
        const vagas = await response.json();

        const container = document.getElementById('lista-vagas');
        container.innerHTML = '';

        vagas.forEach(vaga => {
          const div = document.createElement('div');
          div.className = 'vaga';
          div.innerHTML = `
            <h2>${vaga.titulo}</h2>
            <p>Empresa: ${vaga.empresa}</p>
            <p>Local: ${vaga.local}</p>
            <a class="botao" href="${vaga.link}" target="_blank">Ver detalhes</a>
          `;
          container.appendChild(div);
        });
      } catch (error) {
        console.error("Erro ao carregar vagas:", error);
      }
    }

    carregarVagas();
  </script>
</body>
</html>
